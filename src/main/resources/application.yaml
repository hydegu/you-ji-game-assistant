      logic-delete-field: deleted_at
      logic-delete-value: 'now()'
      logic-not-delete-value: 'null'

app:
  jwt:
    secret: dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci15b3VqaS1hc3Npc3RhbnQ=
    expiration: 86400000

game:
  assistant:
    chunk-size: 400
    overlap-ratio: 0.15

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# 文件存储配置
file:
  storage:
    type: local
    local:
      base-path: ${FILE_STORAGE_PATH:./data/upload/files}
      url-prefix: ${FILE_URL_PREFIX:http://localhost:8080/files}
    allowed-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - image/svg+xml
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - text/plain
      - application/zip
      - application/x-rar-compressed
      - application/x-pem-file        # 标准 PEM 类型
      - application/octet-stream     # 二进制流
      - application/x-x509-ca-cert
    max-size: 104857600


# Springdoc OpenAPI (Swagger) 配置 - 仅开发环境启用
springdoc:
  api-docs:
    path: /v3/api-docs  # API文档路径
    enabled: true
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI路径
    enabled: true
    tags-sorter: alpha  # 标签按字母排序
    operations-sorter: alpha  # 接口按字母排序
  default-consumes-media-type: application/json
  default-produces-media-type: application/json